<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Question For You ❤️</title>

<style>

body{
margin:0;
font-family:Segoe UI,sans-serif;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#ff9a9e,#fad0c4,#ffd1ff);
overflow:hidden;
text-align:center;
}

.container{
background:white;
padding:35px;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.2);
width:85%;
max-width:360px;
z-index:2;
}

h1{
color:#ff3e6c;
font-size:26px;
margin-bottom:25px;
}

button{
padding:15px;
font-size:18px;
border:none;
border-radius:12px;
cursor:pointer;
margin:10px;
width:130px;
transition:0.25s;
}

#yes{
background:#ff3e6c;
color:white;
}

#no{
background:#444;
color:white;
position:absolute;
}

.popup{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 15px 40px rgba(0,0,0,0.3);
width:85%;
max-width:340px;
z-index:3;
}

input,textarea{
padding:12px;
margin-top:10px;
width:90%;
border-radius:8px;
border:1px solid #ddd;
font-size:16px;
}

.submit{
background:#ff3e6c;
color:white;
margin-top:15px;
width:100%;
}

.success{
display:none;
font-size:26px;
color:#ff3e6c;
padding:30px;
}

.flower,.choco{
position:absolute;
font-size:44px;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10vh)}
100%{transform:translateY(110vh)}
}

.confetti{
position:absolute;
font-size:38px;
animation:burst 2s ease-out forwards;
}

@keyframes burst{
0%{transform:scale(0)}
100%{transform:translateY(-220px) scale(1.5);opacity:0}
}

</style>
</head>

<body>

<div class="container">

<h1>🌸 Do you wanna go on a date with me? 🍫</h1>

<button id="yes">Yes ❤️</button>
<button id="no">No 🙈</button>

</div>

<div class="popup" id="formPopup">

<h2>Yay! ❤️</h2>

<form id="dateForm">

<input name="name" placeholder="Your name">

<input name="date" type="date" required>

<input name="time" type="time" required>

<textarea name="message" placeholder="Leave me a message 😊"></textarea>

<button class="submit" type="submit">Submit</button>

</form>

</div>

<div class="success" id="successMessage">
❤️ I'm really glad you said YES ❤️
<br><br>
Now I’m already excited for our date 😊
</div>

<script>

const scriptURL="https://script.google.com/macros/s/AKfycbyWUKnYCPy6P9cGDzrfmdnVqvRmdJOTUKamZlmwKw4DGs_nXS8EuWuhxsbgXESxvP5GoA/exec"

const form=document.getElementById("dateForm")

form.addEventListener("submit",function(e){

e.preventDefault()

fetch(scriptURL,{
method:"POST",
body:new FormData(form)
})
.then(()=>{

document.getElementById("formPopup").style.display="none"
document.querySelector(".container").style.display="none"
document.getElementById("successMessage").style.display="block"

})

})

let noBtn=document.getElementById("no")
let yesBtn=document.getElementById("yes")

let noScale=1
let yesScale=1

function moveNo(){

let x=Math.random()*(window.innerWidth-120)
let y=Math.random()*(window.innerHeight-60)

noBtn.style.left=x+"px"
noBtn.style.top=y+"px"

noScale -=0.1
yesScale +=0.1

noBtn.style.transform="scale("+noScale+")"
yesBtn.style.transform="scale("+yesScale+")"

}

noBtn.addEventListener("touchstart",moveNo)
noBtn.addEventListener("mouseover",moveNo)

yesBtn.onclick=function(){

createConfetti()
document.getElementById("formPopup").style.display="block"

}

function createConfetti(){

for(let i=0;i<25;i++){

let heart=document.createElement("div")
heart.classList.add("confetti")
heart.innerHTML="❤️"

heart.style.left=Math.random()*100+"%"
heart.style.top="60%"

document.body.appendChild(heart)

setTimeout(()=>heart.remove(),2000)

}

}

for(let i=0;i<14;i++){

let flower=document.createElement("div")
flower.classList.add("flower")
flower.innerHTML="🌸"

flower.style.left=Math.random()*100+"%"
flower.style.animationDuration=(Math.random()*4+4)+"s"

document.body.appendChild(flower)

}

for(let i=0;i<10;i++){

let choco=document.createElement("div")
choco.classList.add("choco")
choco.innerHTML="🍫"

choco.style.left=Math.random()*100+"%"
choco.style.animationDuration=(Math.random()*5+5)+"s"

document.body.appendChild(choco)

}

</script>

</body>
</html>
